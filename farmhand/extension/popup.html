<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 300px; margin: 0; padding: 16px; background: #0a0a14; color: #f4f3f8; font: 13px/1.5 -apple-system, system-ui, sans-serif; }
      h1 { font-size: 14px; margin: 0 0 4px; }
      .sub { color: #8b89a0; font-size: 11.5px; margin-bottom: 14px; }
      button { width: 100%; border: none; border-radius: 9px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; background: linear-gradient(180deg, #2dd4bf, #0d9488); color: #04110e; }
      button:disabled { background: #2a2a3a; color: #6e6c82; cursor: default; }
      .hint { color: #6e6c82; font-size: 10.5px; margin-top: 10px; line-height: 1.5; }
      label { display: block; color: #8b89a0; font-size: 10.5px; margin: 14px 0 4px; letter-spacing: 0.04em; }
      input { width: 100%; box-sizing: border-box; background: #14141f; border: 1px solid #2a2a3a; border-radius: 7px; color: #f4f3f8; font-size: 11.5px; padding: 8px 9px; outline: none; }
      .ok { color: #41d98a; font-size: 10.5px; margin-top: 5px; display: none; }
    </style>
  </head>
  <body>
    <h1>🌵 Farmhand Capture</h1>
    <div class="sub">Highlight a thread on this page, then:</div>
    <button id="capture">Send selection to Farmhand →</button>
    <div class="hint">Or right-click any selected text anywhere and choose <b>“Send selection to Farmhand.”</b> Works on Facebook groups, Nextdoor, Reddit — it only reads what you've selected.</div>
    <label>Your Farmhand app URL</label>
    <input id="appurl" placeholder="https://your-app.vercel.app" />
    <div class="ok" id="saved">✓ Saved</div>
    <script src="popup.js"></script>
  </body>
</html>
